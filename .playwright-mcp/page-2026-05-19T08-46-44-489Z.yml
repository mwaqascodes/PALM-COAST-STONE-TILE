    - generic [ref=e601]:
      - generic [ref=e602]:
        - button "What areas in Florida do you serve? +" [ref=e603] [cursor=pointer]:
          - text: What areas in Florida do you serve?
          - generic [ref=e604]: +
        - paragraph [ref=e605]: We serve Palm Coast, all of Flagler County, Flagler Beach, Bunnell, Beverly Beach, Marineland, and nearby communities including St. Augustine and the Ormond Beach / Daytona Beach area. Not sure if we cover your location? Give us a call — we're happy to discuss.
      - generic [ref=e606]:
        - button "Do you offer free estimates? +" [ref=e607] [cursor=pointer]:
          - text: Do you offer free estimates?
          - generic [ref=e608]: +
        - paragraph [ref=e609]: Yes — floor tiling consultations and estimates are always completely free with no obligation. For kitchen and bathroom projects, we offer a detailed on-site quote visit. We believe in transparent pricing with zero hidden surprises.
      - generic [ref=e610]:
        - button "How long does a typical tile project take? +" [ref=e611] [cursor=pointer]:
          - text: How long does a typical tile project take?
          - generic [ref=e612]: +
        - paragraph [ref=e613]: Project timelines depend on scope and square footage. Kitchen tiling installation runs 1–5 days. Full bathroom renovations generally take 3–7 days including full waterproofing, tile install, and the required grout cure time before sealing. For whole-home or large commercial projects, we provide a detailed phased schedule during your free consultation.
      - generic [ref=e614]:
        - button "What types of tile and stone do you work with? +" [ref=e615] [cursor=pointer]:
          - text: What types of tile and stone do you work with?
          - generic [ref=e616]: +
        - paragraph [ref=e617]: We work with all major tile and stone formats — porcelain (including large-format slabs), ceramic, natural marble, travertine, granite, quartz, limestone, slate, and decorative mosaics. We source premium materials from trusted suppliers and can help you select the perfect option for your budget and style.
      - generic [ref=e618]:
        - button "Are you licensed and insured in Florida? +" [ref=e619] [cursor=pointer]:
          - text: Are you licensed and insured in Florida?
          - generic [ref=e620]: +
        - paragraph [ref=e621]: Absolutely. Palm Coast Stone & Tile is fully licensed and insured in the State of Florida. All work is performed in compliance with Florida building codes. Jeff & Gina personally ensure every project meets or exceeds those requirements — protecting your home's value and your peace of mind.
      - generic [ref=e622]:
        - button "What's the best tile for Florida's humid climate? +" [ref=e623] [cursor=pointer]:
          - text: What's the best tile for Florida's humid climate?
          - generic [ref=e624]: +
        - paragraph [ref=e625]: For Florida's humidity and coastal conditions, we recommend porcelain or vitrified tiles — they're non-porous, moisture-resistant, and highly durable. For outdoor spaces and pool surrounds, textured slip-resistant finishes are essential. We always specify vapor barriers, waterproofing membranes, and mold-resistant grout as standard practice.
      - generic [ref=e626]:
        - button "Do you offer a satisfaction guarantee? +" [ref=e627] [cursor=pointer]:
          - text: Do you offer a satisfaction guarantee?
          - generic [ref=e628]: +
        - paragraph [ref=e629]: Yes — 100% satisfaction is our unconditional promise. We've completed over 200 projects across Palm Coast and Flagler County and we stand behind every single one. If you're not completely satisfied with the finished result, we'll return and make it right — no questions asked, no arguments, no invoice.
      - generic [ref=e630]:
        - button "Do you work on commercial projects? +" [ref=e631] [cursor=pointer]:
          - text: Do you work on commercial projects?
          - generic [ref=e632]: +
        - paragraph [ref=e633]: Yes. Palm Coast Stone & Tile works with both residential homeowners and commercial clients across Flagler County and North Florida. We've completed tile installations in retail spaces, offices, restaurants, and hospitality venues. Contact us to discuss your commercial scope.
      - generic [ref=e634]:
        - button "Can you match existing tile or blend with current flooring? +" [ref=e635] [cursor=pointer]:
          - text: Can you match existing tile or blend with current flooring?
          - generic [ref=e636]: +
        - paragraph [ref=e637]: Often, yes. Jeff & Gina have extensive experience sourcing discontinued tile lines and closely matching existing formats, textures, and grout colors. Bring us a sample or a photo and we'll do our best to find the closest possible match.
