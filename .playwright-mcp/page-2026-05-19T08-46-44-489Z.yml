      - heading "Bring Shine to Your Home Floor & Tile Forever" [level=2] [ref=e164]
      - paragraph [ref=e165]: "Jeff & Gina Herbert founded Palm Coast Stone & Tile in 2006 with a simple belief: every home deserves craftsmanship that lasts a lifetime. What began as a passion for precision tile work in Flagler County has grown into one of North Florida's most trusted stone and tile operations — built entirely on referrals, repeat clients, and a reputation for getting every detail right the first time."
      - paragraph [ref=e166]: Living and working on Florida's Atlantic coast, Jeff & Gina understand the unique demands of our climate — the salt air, the humidity, the summer heat that tests every material. They specify vapor barriers as standard, source only vitrified porcelain and sealed natural stone for exterior applications, and never cut corners.
