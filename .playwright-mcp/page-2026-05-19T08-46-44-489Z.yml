    - generic [ref=e354]:
      - generic [ref=e355]: How We Work
      - heading "From Concept to Flawless Finish" [level=2] [ref=e356]
      - paragraph [ref=e357]: A transparent, client-focused workflow that ensures precision at every stage — no surprises, no rushed installs, no subcontractors. Jeff or Gina are on-site from your first call to the final sealed grout line.
    - generic [ref=e358]:
      - generic [ref=e359]:
        - generic [ref=e360]: "01"
        - generic [ref=e361]: Free Consultation
        - paragraph [ref=e362]: Jeff or Gina visits your home for a full on-site assessment — space measurement, design goal discussion, and transparent budget guidance. Always free, always no-pressure.
      - generic [ref=e363]:
        - generic [ref=e364]: "02"
        - generic [ref=e365]: Design & Selection
        - paragraph [ref=e366]: We bring physical tile and stone samples directly to your space so you can see real materials under your lighting. Layout patterns, grout pairings, and finish options are mapped before any ordering begins.
      - generic [ref=e367]:
        - generic [ref=e368]: "03"
        - generic [ref=e369]: Prep & Waterproof
        - paragraph [ref=e370]: The step most contractors skip — and the reason tiles crack and grout fails. We level substrates, install waterproofing membranes, and cement backer board before any tile is touched.
      - generic [ref=e371]:
        - generic [ref=e372]: "04"
        - generic [ref=e373]: Precision Install
        - paragraph [ref=e374]: Tile and stone set with laser-leveled alignment, calibrated tile spacers, and premium polymer-modified thin-set. Large-format tiles receive back-buttering for zero hollow spots.
      - generic [ref=e375]:
        - generic [ref=e376]: "05"
        - generic [ref=e377]: Grout, Seal & Walkthrough
        - paragraph [ref=e378]: Mold-resistant, color-fast grout is applied, cured 24–48 hours, and sealed with penetrating stone sealer. We walk you through every inch of the finished space before calling the job done.
