    - generic [ref=e477]:
      - generic [ref=e478]:
        - button "What areas in Florida do you serve? +" [ref=e479] [cursor=pointer]:
          - text: What areas in Florida do you serve?
          - generic [ref=e480]: +
        - paragraph [ref=e481]: We serve Palm Coast, all of Flagler County, Flagler Beach, Bunnell, Beverly Beach, Marineland, and nearby communities including St. Augustine and the Ormond Beach / Daytona Beach area. Not sure if we cover your location? Give us a call — we're happy to discuss.
      - generic [ref=e482]:
        - button "Do you offer free estimates? +" [ref=e483] [cursor=pointer]:
          - text: Do you offer free estimates?
          - generic [ref=e484]: +
        - paragraph [ref=e485]: Yes — floor tiling consultations and estimates are always completely free with no obligation. For kitchen and bathroom projects, we offer a detailed on-site quote visit. We believe in transparent pricing with zero hidden surprises.
      - generic [ref=e486]:
        - button "How long does a typical tile project take? +" [ref=e487] [cursor=pointer]:
          - text: How long does a typical tile project take?
          - generic [ref=e488]: +
        - paragraph [ref=e489]: Project timelines vary by scope and square footage. A standard floor tiling consultation takes about 1 hour. Kitchen tiling projects typically run 1–5 days. Full bathroom renovations generally take 3–7 days depending on complexity. We'll give you a precise timeline during your free consultation.
      - generic [ref=e490]:
        - button "What types of tile and stone do you work with? +" [ref=e491] [cursor=pointer]:
          - text: What types of tile and stone do you work with?
          - generic [ref=e492]: +
        - paragraph [ref=e493]: We work with all major tile and stone formats — porcelain (including large-format slabs), ceramic, natural marble, travertine, granite, quartz, limestone, slate, and decorative mosaics. We source premium materials from trusted suppliers and can help you select the perfect option for your budget and style.
      - generic [ref=e494]:
        - button "Are you licensed and insured in Florida? +" [ref=e495] [cursor=pointer]:
          - text: Are you licensed and insured in Florida?
          - generic [ref=e496]: +
        - paragraph [ref=e497]: Absolutely. Palm Coast Stone & Tile is fully licensed and insured in the State of Florida. Jeff & Gina personally ensure all work meets Florida building codes and standards. You can proceed with complete confidence and peace of mind.
      - generic [ref=e498]:
        - button "What's the best tile for Florida's humid climate? +" [ref=e499] [cursor=pointer]:
          - text: What's the best tile for Florida's humid climate?
          - generic [ref=e500]: +
        - paragraph [ref=e501]: For Florida's humidity and coastal conditions, we recommend porcelain or vitrified tiles — they're non-porous, moisture-resistant, and highly durable. For outdoor spaces and pool surrounds, textured slip-resistant finishes are essential. We always specify vapor barriers, waterproofing membranes, and mold-resistant grout as standard practice.
      - generic [ref=e502]:
        - button "Can you help me choose the right tile design? +" [ref=e503] [cursor=pointer]:
          - text: Can you help me choose the right tile design?
          - generic [ref=e504]: +
        - paragraph [ref=e505]: Yes — Jeff & Gina offer hands-on design consultation as part of every project. We'll guide you through material selection, layout patterns (herringbone, subway, large-format, mosaic), grout color pairings, and style direction — whether you prefer contemporary, rustic, or timeless elegance. We bring samples so you can see real materials in your space.
      - generic [ref=e506]:
        - button "Do you offer a satisfaction guarantee? +" [ref=e507] [cursor=pointer]:
          - text: Do you offer a satisfaction guarantee?
          - generic [ref=e508]: +
        - paragraph [ref=e509]: Yes — 100% satisfaction is our unconditional promise. We've completed over 200 projects and stand behind every single one. If you're not completely satisfied with the finished result, we'll make it right. No questions asked. Your home deserves nothing less than perfection.
